name: Build Validation

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ release ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (all TFMs)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            src/**/bin/Release/
            tests/**/bin/Release/

  test:
    name: Test (${{ matrix.os }} / net${{ matrix.tfm }})
    runs-on: ${{ matrix.os }}
    needs: build

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        tfm: ['8.0', '9.0', '10.0']

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.tfm }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.tfm }}

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Test
        run: dotnet vstest tests/bin/Release/net${{ matrix.tfm }}/OwlCore.Storage.Ntfs.Tests.dll --logger:"console;verbosity=detailed" --logger:GitHubActions